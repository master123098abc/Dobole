<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sync Protocol</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap');

        :root {
            --bg-color: #05050a;
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --text-main: #e0e0e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Share Tech Mono', monospace;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--neon-pink);
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 8px var(--neon-pink);
            margin-bottom: 40px;
        }

        .container {
            background: rgba(10, 10, 15, 0.8);
            border: 1px solid rgba(0, 243, 255, 0.3);
            padding: 30px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--neon-pink);
            color: var(--neon-blue);
            padding: 10px;
            width: 80%;
            text-align: center;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            margin-bottom: 25px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            box-shadow: 0 10px 10px -10px var(--neon-pink);
        }

        button {
            background: transparent;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 15px 30px;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.3s ease;
            margin: 10px 0;
            width: 100%;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2) inset;
        }

        button:hover:not(:disabled) {
            background: var(--neon-blue);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--neon-blue);
        }

        button:disabled {
            cursor: not-allowed;
            border-color: #555;
            color: #555;
            box-shadow: none;
        }

        .btn-pink {
            color: var(--neon-pink);
            border-color: var(--neon-pink);
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.2) inset;
        }

        .btn-pink:hover {
            background: var(--neon-pink);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--neon-pink);
        }

        .secret-code {
            font-size: 1.6rem;
            color: #fff;
            letter-spacing: 4px;
            margin: 20px 0;
            text-shadow: 0 0 15px var(--neon-blue);
            background: rgba(0, 243, 255, 0.1);
            padding: 10px;
            border-radius: 4px;
        }

        #game-board {
            display: none;
        }

        #task-display {
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #fff;
            border: 1px solid var(--neon-pink);
            border-radius: 8px;
            padding: 25px;
            margin: 25px 0;
            background: rgba(255, 0, 255, 0.05);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.2) inset;
            line-height: 1.5;
            transition: 0.3s;
        }

        .pulse-text {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.7; text-shadow: 0 0 5px var(--neon-pink); }
            50% { opacity: 1; text-shadow: 0 0 20px var(--neon-pink); }
            100% { opacity: 0.7; text-shadow: 0 0 5px var(--neon-pink); }
        }

        .flicker {
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.9; color: var(--neon-blue); }
            50% { opacity: 0.2; color: #fff; }
            100% { opacity: 1; color: var(--neon-pink); }
        }
    </style>
</head>
<body>

    <h1>SYNC PROTOCOL</h1>
    <p class="subtitle">Neural Link Established</p>

    <div class="container" id="setup-board">
        <p style="color: var(--neon-blue);">[ INITIATE CONNECTION ]</p>
        
        <button onclick="createRoom()">1. Generate Link Code (Control)</button>
        <div id="room-id-display" class="secret-code" style="display:none;">Generating...</div>
        
        <hr style="border-color: rgba(255,255,255,0.1); margin: 30px 0;">
        
        <p style="color: var(--neon-pink);">[ OR ENTER EXISTING LINK ]</p>
        <input type="text" id="join-id" placeholder="Paste Code Here">
        <button class="btn-pink" onclick="joinRoom()">2. Synchronize (Submit)</button>
    </div>

    <div class="container" id="game-board">
        <p id="status-text" style="color: var(--neon-blue); font-weight: bold; text-shadow: 0 0 5px var(--neon-blue);">[ DEVICES SYNCHRONIZED ]</p>
        
        <div id="task-display" class="pulse-text">Awaiting transmission...</div>
        
        <button onclick="drawTask()" id="draw-btn">Transmit Command</button>
    </div>

    <script>
        const intenseTasks = [
            // Pain & Marking
            "Bite your own forearm or wrist until it leaves clear teeth marks. Send a view-once photo of my temporary mark on you.",
            "Spank your own thigh 5 times, hard. Send a voice note where I can hear the slaps, and count them out loud for me.",
            "Drag your nails down your chest or stomach hard enough to leave faint red lines. Send a view-once picture of the scratches.",
            "Pinch the sensitive skin of your inner thigh as hard as you can bear for 10 seconds. Send a photo of the red mark.",
            "Wrap your hand in your own hair and pull your head back hard. Take a photo of your exposed throat.",
            "Slap your own cheek sharply. Send a voice note of the sound, followed by you saying, 'Thank you.'",
            "Bite your bottom lip as hard as you can without drawing blood. Hold it for 10 seconds. Send a close-up photo.",
            
            // Temperature & Sensory
            "Hold an ice cube in your mouth until it hurts from the cold, then use your wet fingers to touch your most sensitive spot. Send a video.",
            "Take a drop of hot (but safe) wax or hot water, and let it drop onto your stomach. Send a voice note of your reaction.",
            "Rub a dry towel aggressively over your bare skin until it burns slightly and turns pink. Send a photo.",
            "Close your eyes. Run your nails lightly over your skin, right on the edge of where it tickles and hurts. Send audio.",
            "Bite down on your own finger hard enough to feel pressure. Look at the camera with glossy eyes and send a photo.",

            // Denial & Teasing
            "Touch yourself exactly how you like it until you are right on the edge. Then STOP completely. Send a voice note of your breathing.",
            "Keep your hands firmly pinned behind your back. You are not allowed to touch yourself for the next 10 minutes.",
            "Hover your fingers barely a millimeter above your skin without making contact. Send a video of your shaking hands.",
            "Voice note: Beg me to let you finish. Tell me exactly how much it hurts to be denied right now.",
            "Rub your most sensitive spot rapidly through your clothes for 60 seconds without stopping. Send the audio.",
            "Type: 'I am aching for you.' You are not allowed to move until I give you permission.",

            // Humiliation & Obedience
            "Kneel on a hard floor. Stay there until your knees ache. Send a photo looking up from the floor.",
            "Take a marker or pen. Write 'YOURS' across your stomach or chest. Send a view-once photo.",
            "Strip completely naked. Stand in the coldest part of your room until you get goosebumps. Send a photo.",
            "Record a voice note of yourself whimpering my name. I want to hear the desperation.",
            "Put your face flat against the floor. Send a voice note saying, 'I am entirely at your mercy.'",
            "Hold a heavy object in each hand with your arms stretched straight out. Hold until your muscles burn. Send a video.",
            "If you have a belt, wrap it tightly around your upper arm to create a squeeze. Take a photo of the pressure.",
            "Voice note: Describe exactly how you want me to punish you the next time you misbehave.",
            "Trace the edge of a cold metal spoon slowly down your neck and chest. Send a video.",
            "Spread your legs and stay completely still. Send a voice note describing the exact physical ache right now.",
            "Look into the camera. Slap your own thigh hard, bite your lip, and whisper, 'More, please.' Send the video."
        ];

        let peer = new Peer();
        let conn;

        function createRoom() {
            document.getElementById('room-id-display').style.display = 'block';
            peer.on('open', function(id) {
                document.getElementById('room-id-display').innerText = id;
            });
            peer.on('connection', function(connection) {
                conn = connection;
                setupConnectionListeners();
                startGame();
            });
        }

        function joinRoom() {
            let joinId = document.getElementById('join-id').value;
            if(!joinId) return alert("Enter the connection code first.");
            // Added reliable: true to prevent connection dropping
            conn = peer.connect(joinId, { reliable: true });
            
            conn.on('open', function() {
                setupConnectionListeners();
                startGame();
                document.getElementById('draw-btn').style.display = 'none'; // Only Control can transmit
            });
        }

        function setupConnectionListeners() {
            conn.on('data', function(data) {
                showTaskOnScreen(data);
                if("vibrate" in navigator) navigator.vibrate([100, 50, 100, 50, 200]); 
            });
            
            conn.on('close', function() {
                document.getElementById('status-text').innerText = "[ CONNECTION LOST - REFRESH PAGE ]";
                document.getElementById('status-text').style.color = "red";
            });
        }

        function startGame() {
            document.getElementById('setup-board').style.display = 'none';
            document.getElementById('game-board').style.display = 'block';
        }

        function drawTask() {
            let randomTask = intenseTasks[Math.floor(Math.random() * intenseTasks.length)];
            
            let display = document.getElementById('task-display');
            let btn = document.getElementById('draw-btn');
            
            display.classList.remove('pulse-text');
            display.classList.add('flicker');
            display.innerText = "DECRYPTING COMMAND...";
            
            // Disable button
            btn.disabled = true;
            btn.style.opacity = 0.5;
            
            setTimeout(() => {
                display.classList.remove('flicker');
                showTaskOnScreen(randomTask);
                
                // Safety net: Try to send, but ALWAYS re-enable the button even if it fails
                try {
                    if(conn && conn.open) {
                        conn.send(randomTask); 
                    } else {
                        document.getElementById('status-text').innerText = "[ WARNING: DEVICE DISCONNECTED ]";
                        document.getElementById('status-text').style.color = "red";
                    }
                } catch (error) {
                    console.error("Transmission failed", error);
                } finally {
                    // This ensures the button ALWAYS comes back
                    btn.disabled = false;
                    btn.style.opacity = 1;
                }
                
            }, 1200);
        }

        function showTaskOnScreen(taskText) {
            document.getElementById('task-display').innerHTML = `<span style="color: #fff; text-shadow: 0 0 8px var(--neon-blue);">${taskText}</span>`;
        }
    </script>
</body>
</html>
